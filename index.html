<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cold Zero – כיוון אפס קר</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: #1a1a2e; color: #eee;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            padding: 20px;
        }
        h1 { margin: 20px 0 5px; font-size: 1.8em; color: #00d4ff; }
        .subtitle { color: #888; margin-bottom: 20px; font-size: 0.95em; }
        .container { max-width: 900px; width: 100%; }
        .upload-area {
            border: 3px dashed #444; border-radius: 16px; padding: 40px;
            text-align: center; cursor: pointer; transition: 0.3s;
            margin-bottom: 20px; background: #16213e;
        }
        .upload-area:hover { border-color: #00d4ff; background: #1a1a3e; }
        .upload-area.has-image { border-color: #27ae60; }
        .upload-area p { font-size: 1.1em; color: #aaa; }
        .upload-area .icon { font-size: 3em; margin-bottom: 10px; }
        #fileInput { display: none; }
        #preview {
            max-width: 100%; max-height: 400px; border-radius: 12px;
            display: none; margin: 0 auto;
        }
        .btn {
            background: #00d4ff; color: #1a1a2e; border: none; padding: 14px 40px;
            font-size: 1.1em; font-weight: bold; border-radius: 10px; cursor: pointer;
            transition: 0.3s; display: block; margin: 15px auto;
        }
        .btn:hover { background: #00b8d9; }
        .btn:disabled { background: #555; cursor: not-allowed; color: #999; }
        #results {
            background: #16213e; border-radius: 12px; padding: 25px;
            margin-top: 20px; display: none; direction: ltr; text-align: left;
        }
        #results.error { border: 2px solid #e74c3c; }
        #results.success { border: 2px solid #27ae60; }
        .result-title { font-size: 1.2em; margin-bottom: 15px; font-weight: bold; }
        .result-title.error { color: #e74c3c; }
        .result-title.success { color: #27ae60; }
        .result-row {
            display: flex; justify-content: space-between; padding: 10px 0;
            border-bottom: 1px solid #2a2a4a; font-size: 1.05em;
        }
        .result-row:last-child { border-bottom: none; }
        .result-label { color: #aaa; }
        .result-value { color: #fff; font-weight: bold; font-family: monospace; font-size: 1.1em; }
        #loading { display: none; text-align: center; padding: 20px; color: #00d4ff; }
        .spinner { display: inline-block; width: 30px; height: 30px;
            border: 3px solid #333; border-top: 3px solid #00d4ff;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #canvasOutput { display: none; }
        .config-section {
            background: #16213e; border-radius: 12px; padding: 20px;
            margin-bottom: 20px; direction: ltr; text-align: left;
        }
        .config-section summary {
            cursor: pointer; color: #00d4ff; font-weight: bold; font-size: 1em;
        }
        .config-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 12px;
        }
        .config-grid label { color: #aaa; font-size: 0.85em; display: block; margin-bottom: 4px; }
        .config-grid input {
            width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #444;
            background: #1a1a2e; color: #fff; font-size: 1em;
        }
        @media (max-width: 600px) {
            .config-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<h1>🎯 Cold Zero – כיוון אפס קר</h1>
<p class="subtitle">העלה תמונה של המטרה עם נקודת לייזר (ירוקה) ורטיקל (אדום)</p>

<div class="container">
    <details class="config-section">
        <summary>⚙️ Configuration (Default Values)</summary>
        <div class="config-grid">
            <div>
                <label>Bore to Rail Height (mm)</label>
                <input type="number" id="cfgBoreToRail" value="25.4" step="0.1">
            </div>
            <div>
                <label>Optic Base to Center (mm)</label>
                <input type="number" id="cfgOpticCenter" value="38.0" step="0.1">
            </div>
            <div>
                <label>Grid Spacing (mm)</label>
                <input type="number" id="cfgGridSpacing" value="10.0" step="0.1">
            </div>
        </div>
    </details>

    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="icon">📷</div>
        <p>לחץ כאן או גרור תמונה</p>
        <img id="preview">
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <button class="btn" id="processBtn" disabled>🔍 נתח תמונה</button>

    <div id="loading">
        <div class="spinner"></div>
        <span>מעבד תמונה...</span>
    </div>

    <div id="results"></div>

    <canvas id="annotatedCanvas" style="display:none; max-width:100%; border-radius:12px; margin-top:15px;"></canvas>
    <div id="legend" style="display:none; direction:ltr; text-align:left; margin-top:10px; color:#aaa; font-size:0.9em;">
        🟢 Green circle = Detected laser &nbsp;&nbsp; 🔴 Red circle = Detected reticle &nbsp;&nbsp; 🔵 Blue dot = Ideal reticle position
    </div>
</div>

<canvas id="canvasOutput" style="display:none;"></canvas>

<script async src="https://docs.opencv.org/4.9.0/opencv.js" onload="onOpenCvReady()" type="text/javascript"></script>
<script src="app.js"></script>

</body>
</html>
