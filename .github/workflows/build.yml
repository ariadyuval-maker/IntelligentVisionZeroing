name: Build & Run Cold Zero

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libopencv-dev nlohmann-json3-dev

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Run
        run: |
          cd build
          ./cold_zero
